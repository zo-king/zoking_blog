<h{{ .Level }} id="{{ .Anchor }}">
    {{- if site.Params.Article.HeadingAnchor -}}
        {{- $headingTitle := .Text | plainify -}}
        <a href="#{{ .Anchor }}" class="header-anchor" data-heading-link data-heading-title="{{ $headingTitle }}" aria-label="定位并复制“{{ $headingTitle }}”章节链接" title="复制章节链接"></a>
    {{- end -}}
    {{ .Text | safeHTML }}
</h{{ .Level }}>
